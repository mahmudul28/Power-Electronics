<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter: AC Voltage Controllers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Lock the body so the window itself never scrolls, only the iframe inside it scrolls */
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-slate-900 border-b border-slate-700 p-4 flex flex-col md:flex-row justify-between items-center shadow-lg z-20">
        <div class="mb-3 md:mb-0">
            <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-3">
                <span class="bg-indigo-600 text-white px-2 py-1 rounded text-sm uppercase tracking-widest shadow-md">Chapter</span>
                AC Voltage Controllers
            </h1>
        </div>
        
        <div class="flex space-x-1 bg-slate-800 p-1 rounded-lg border border-slate-700 shadow-inner">
            <button id="btn-ac" class="px-5 py-2 rounded-md bg-indigo-600 text-white text-sm font-semibold transition-all shadow-md">
                Standard Controllers
            </button>
            <button id="btn-cyclo" class="px-5 py-2 rounded-md bg-transparent text-slate-400 hover:text-white text-sm font-semibold transition-all">
                Cycloconverters
            </button>
        </div>
    </header>

    <main class="flex-1 w-full bg-slate-800 relative">
        <iframe id="sim-frame" src="ac_controller.html" class="w-full h-full border-none absolute top-0 left-0"></iframe>
    </main>

    <script>
        const btnAc = document.getElementById('btn-ac');
        const btnCyclo = document.getElementById('btn-cyclo');
        const frame = document.getElementById('sim-frame');

        // Switch to AC Controllers
        btnAc.addEventListener('click', () => {
            frame.src = 'ac_controller.html';
            
            // Highlight AC button
            btnAc.className = 'px-5 py-2 rounded-md bg-indigo-600 text-white text-sm font-semibold transition-all shadow-md';
            // Dim Cyclo button
            btnCyclo.className = 'px-5 py-2 rounded-md bg-transparent text-slate-400 hover:text-white text-sm font-semibold transition-all';
        });

        // Switch to Cycloconverters
        btnCyclo.addEventListener('click', () => {
            frame.src = 'cycloconverter.html';
            
            // Highlight Cyclo button
            btnCyclo.className = 'px-5 py-2 rounded-md bg-indigo-600 text-white text-sm font-semibold transition-all shadow-md';
            // Dim AC button
            btnAc.className = 'px-5 py-2 rounded-md bg-transparent text-slate-400 hover:text-white text-sm font-semibold transition-all';
        });
    </script>
</body>
</html>
