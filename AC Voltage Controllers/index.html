<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter: AC Voltage Controllers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Color Palette Variables matching the advanced theme */
        :root {
            --bg-deep: #050505;
            --bg-glow: #0a0f1c;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top, var(--bg-glow) 0%, var(--bg-deep) 100%);
            color: #f8fafc; 
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .active-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(99, 102, 241, 0.2);
            color: #fff;
        }

        .inactive-btn {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }
        .inactive-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Seamless iframe integration */
        iframe {
            background: transparent;
            color-scheme: dark;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Mobile-Only Desktop Site Warning -->
    <div class="md:hidden bg-amber-500/10 border-b border-amber-500/20 text-amber-500 text-[11px] font-bold uppercase tracking-widest text-center py-2 px-4 shadow-[0_4px_15px_rgba(245,158,11,0.1)] z-50 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        For the best experience, turn on "Desktop Site"
    </div>

    <header class="glass-panel p-4 md:p-5 flex flex-col md:flex-row justify-between items-center z-20 m-0 border-x-0 border-t-0 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
        <div class="mb-4 md:mb-0">
            <h1 class="text-xl md:text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 flex items-center gap-3">
                <span class="bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 px-2.5 py-1 rounded text-xs uppercase tracking-widest shadow-[inset_0_0_10px_rgba(99,102,241,0.2)]">Chapter</span>
                AC Voltage Controllers
            </h1>
        </div>
        
        <div class="flex space-x-2 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
            <button id="btn-ac" class="px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 border active-btn scale-[1.02]">
                Standard Controllers
            </button>
            <button id="btn-cyclo" class="px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 border inactive-btn">
                Cycloconverters
            </button>
        </div>
    </header>

    <main class="flex-1 w-full relative z-10">
        <!-- Update the src attributes in the script below if your file names differ -->
        <iframe id="sim-frame" src="ac_controller.html" class="w-full h-full border-none absolute top-0 left-0 transition-opacity duration-300"></iframe>
    </main>

    <script>
        // Note: Change these filenames if your advanced HTML files are named differently 
        // (e.g., 'ac_voltage_controllers_advanced.html' & 'cycloconverter_advanced.html')
        const FILE_AC = 'ac_controller.html';
        const FILE_CYCLO = 'cycloconverter.html';

        const btnAc = document.getElementById('btn-ac');
        const btnCyclo = document.getElementById('btn-cyclo');
        const frame = document.getElementById('sim-frame');

        const activeClass = 'px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 border active-btn scale-[1.02]';
        const inactiveClass = 'px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300 border inactive-btn';

        btnAc.addEventListener('click', () => {
            if (frame.src.includes(FILE_AC)) return;
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = FILE_AC;
                btnAc.className = activeClass;
                btnCyclo.className = inactiveClass;
                frame.onload = () => frame.style.opacity = '1';
            }, 150);
        });

        btnCyclo.addEventListener('click', () => {
            if (frame.src.includes(FILE_CYCLO)) return;
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = FILE_CYCLO;
                btnCyclo.className = activeClass;
                btnAc.className = inactiveClass;
                frame.onload = () => frame.style.opacity = '1';
            }, 150);
        });
    </script>
</body>
</html>
