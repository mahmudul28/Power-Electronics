    <style>
        /* Color Palette Variables for easy management */
        :root {
            --bg-deep: #050505;
            --bg-glow: #0a0f1c;
            --phase-a: #ff2a5f; /* Neon Rose/Red */
            --phase-b: #00f0ff; /* Electric Cyan */
            --phase-c: #00ff66; /* Neon Green */
            --grid-line: rgba(255, 255, 255, 0.07);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top, var(--bg-glow) 0%, var(--bg-deep) 100%);
            color: #f8fafc; 
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .dot-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #fff;
            margin-top: -6.5px;
            cursor: pointer;
            box-shadow: 0 0 10px currentColor, 0 0 5px rgba(255,255,255,0.8);
            border: 2px solid currentColor;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        .slider-a { color: var(--phase-a); }
        .slider-b { color: var(--phase-b); }
        .slider-c { color: var(--phase-c); }
        .slider-theta { color: #f59e0b; }
        .slider-zoom { color: #a855f7; }
        
        svg path { transition: d 0.1s ease-out; }
        
        .active-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(99, 102, 241, 0.2);
            color: #fff;
        }
    </style>
</head>

        const colors = {

            deviceD: '#64748b',

        const toRad = (deg) => (deg * Math.PI) / 180;

        const isOn = (deg, start, dur) => {
            if (dur <= 0) return false;
            const end = start + dur;
            const sMod = start % 360;
            const eMod = end % 360;
            const dMod = deg % 360;
            if (sMod <= eMod) return dMod >= sMod && dMod < eMod;
            return dMod >= sMod || dMod < eMod;
        };

        const solveRL = (alpha, theta) => {
            if (alpha <= theta) return alpha + 180;
            const aRad = toRad(alpha);
            const tRad = toRad(theta);
            for (let i = alpha + 1; i <= alpha + 240; i++) {
                const w = toRad(i);
                const cur = Math.sin(w - tRad) - Math.sin(aRad - tRad) * Math.exp(-(w - aRad) / Math.tan(tRad));
                if (cur <= 0) return i;
            }
            return alpha + 180;
        };

        const formatText = (text) => {

        const getCircuitSVG = (mode) => {

            let p1BaseStart = `<svg viewBox="0 0 800 250" class="w-full h-auto max-h-[300px]">

        const buildWaveChart = (title, data, lines, height = 150, center = 75, scale = 50) => {
            let svg = `<svg viewBox="0 0 540 ${height}" class="w-full h-auto overflow-visible mb-6 block text-left" style="min-height: ${height}px;">`;
            
            for(let deg = 0; deg <= 540; deg += 30) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="${colors.grid}" stroke-dasharray="2 2" stroke-width="1"/>`;
                if(deg % 90 === 0) {
                    let label = '';
                    if (deg === 0) label = '0';
                    else if (deg === 90) label = 'π/2';
                    else if (deg === 180) label = 'π';
                    else if (deg === 270) label = '3π/2';
                    else if (deg === 360) label = '2π';
                    else if (deg === 450) label = '5π/2';
                    else if (deg === 540) label = '3π';
                    svg += `<text x="${deg === 0 ? 2 : deg + 2}" y="${height - 4}" fill="#475569" font-size="10" font-family="'JetBrains Mono', monospace">${label}</text>`;
                }
            }

            svg += `<line x1="0" y1="${center}" x2="540" y2="${center}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
            svg += `<text x="0" y="16" fill="#f8fafc" font-size="12" font-weight="bold" font-family="sans-serif" filter="url(#glow)">${formatText(title)}</text>`;

            let legX = 530;
            [...lines].reverse().forEach(line => {
                if(line.name) {
                    legX -= 35;
                    svg += `<text x="${legX + 12}" y="16" fill="${line.color}" font-size="11" font-weight="bold" font-family="sans-serif">${formatText(line.name)}</text>`;
                    svg += `<line x1="${legX}" y1="13" x2="${legX + 8}" y2="13" stroke="${line.color}" stroke-width="3" filter="url(#glow)" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''}/>`;
                }
            });

            lines.forEach(line => {
                if (!data.length) return;
                let d = `M 0 ${center - (data[0][line.key] || 0) * scale}`;
                for (let i = 1; i <= 540; i++) {
                    const val = data[i][line.key] || 0;
                    const prevVal = data[i - 1][line.key] || 0;
                    const y = center - val * scale;
                    const prevY = center - prevVal * scale;
                    
                    if (Math.abs(y - prevY) > scale * 0.15) {
                        d += ` L ${i} ${prevY}`;
                    }
                    d += ` L ${i} ${y}`;
                }
                
                if (line.fill) {
                    svg += `<path d="${d} L 540 ${center} L 0 ${center} Z" fill="${line.fill}" opacity="0.6"/>`;
                }
                
                // REMOVED stroke-linejoin="round" and stroke-linecap="round" to keep the sharp edges mathematically accurate
                svg += `<path d="${d}" fill="none" stroke="${line.color}" stroke-width="${line.width || 2}" filter="url(#glow-intense)" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''} />`;
            });
            svg += `</svg>`;
            return svg;
        };

        const getBlocks = (data, key) => {
            const blocks = [];
            let start = null;
            for (let i = 0; i <= 540; i++) {
                if (data[i] && data[i][key] && start === null) start = i;
                if (data[i] && !data[i][key] && start !== null) {
                    blocks.push({ s: start, e: i });
                    start = null;
                }
            }
            if (start !== null) blocks.push({ s: start, e: 540 });
            return blocks;
        };

        const buildGanttChart = (data, devices) => {
            const rowHeight = 24;
            const height = devices.length * rowHeight + 35;
            let svg = `<svg viewBox="0 0 540 ${height}" class="w-full h-auto overflow-visible mb-8 block text-left bg-black/20 rounded-xl" style="min-height: ${height}px;">`;
            
            for(let deg = 0; deg <= 540; deg += 30) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="${colors.grid}" stroke-dasharray="2 2" stroke-width="1"/>`;
            }
            
            svg += `<text x="5" y="16" fill="#f8fafc" font-size="12" font-weight="bold" font-family="sans-serif">Device Conduction Sequence</text>`;

            devices.forEach((dev, idx) => {
                const y = idx * rowHeight + 25;
                svg += `<text x="5" y="${y + 13}" fill="${dev.color}" font-size="10" font-weight="bold" font-family="sans-serif" filter="url(#glow)">${formatText(dev.label)}</text>`;
                const blocks = getBlocks(data, dev.key);
                blocks.forEach(b => {
                    svg += `<rect x="${b.s}" y="${y}" width="${b.e - b.s}" height="16" fill="${dev.color}" opacity="0.9" rx="3" filter="url(#glow)" />`;

            svg += `</svg>`;
            return svg;

        const computeData = () => {
            const arr = [];
            const is3P = state.mode.startsWith('3p');
            
            const aA = state.alphaA;
            const aB = state.linked ? aA : state.alphaB;
            const aC = state.linked ? aA : state.alphaC;

            let betaA = 180, betaB = 180;
            if (state.mode === '1p-rl') {
                betaA = solveRL(aA, state.theta);
                betaB = betaA + 180;   // symmetric half-cycle, no need to re-solve
            }

            for (let i = 0; i <= 540; i++) {
                const rad = toRad(i);
                const pt = { deg: i, vA: Math.sin(rad) };
                
                if (is3P) {
                    pt.vB = Math.sin(rad - toRad(120));
                    pt.vC = Math.sin(rad - toRad(240));
                    pt.vAB = pt.vA - pt.vB;
                    pt.vBC = pt.vB - pt.vC;
                    pt.vCA = pt.vC - pt.vA;
                }

                if (state.mode === '1p-hw') {
                    pt.t1 = i >= aA && i <= 180;
                    pt.voA = pt.t1 ? pt.vA : 0;
                    pt.vt1 = pt.t1 ? 0 : pt.vA;
                } 
                else if (state.mode === '1p-fw') {
                    pt.t1 = i >= aA && i <= 180;
                    pt.t2 = i >= aA + 180 && i <= 360;
                    pt.voA = (pt.t1 || pt.t2) ? pt.vA : 0;
                    pt.vt1 = (pt.t1 || pt.t2) ? 0 : pt.vA;
                } 
                else if (state.mode === '1p-rl') {
                    pt.t1 = isOn(i, aA, betaA - aA);
                    pt.t2 = isOn(i, aA + 180, betaB - (aA + 180));
                    pt.voA = (pt.t1 || pt.t2) ? pt.vA : 0;
                    pt.vt1 = (pt.t1 || pt.t2) ? 0 : pt.vA;
                } 
                else if (state.mode === '3p-delta') {
                    pt.t1 = isOn(i, aA, 180 - aA);       pt.t4 = isOn(i, aA + 180, 180 - aA); 
                    pt.t3 = isOn(i, aB + 120, 180 - aB); pt.t6 = isOn(i, aB + 300, 180 - aB); 
                    pt.t5 = isOn(i, aC + 240, 180 - aC); pt.t2 = isOn(i, aC + 60,  180 - aC); 

                    pt.voA = (pt.t1 || pt.t4) ? pt.vAB : 0; 
                    pt.voB = (pt.t3 || pt.t6) ? pt.vBC : 0; 
                    pt.voC = (pt.t5 || pt.t2) ? pt.vCA : 0; 
                    pt.vt1 = (pt.t1 || pt.t4) ? 0 : pt.vAB;
                } 
                else {
                    let t1=false, t2=false, t3=false, t4=false, t5=false, t6=false;
                    let d1=false, d2=false, d3=false, d4=false, d5=false, d6=false;

                    if (state.mode === '3p-fw-wye') {
                        t1 = isOn(i, aA, 180 - aA);       t4 = isOn(i, aA + 180, 180 - aA);
                        t3 = isOn(i, aB + 120, 180 - aB); t6 = isOn(i, aB + 300, 180 - aB);
                        t5 = isOn(i, aC + 240, 180 - aC); t2 = isOn(i, aC + 60, 180 - aC);
                    } else if (state.mode === '3p-hw-std') {
                        t1 = isOn(i, aA, 180 - aA);
                        t3 = isOn(i, aB + 120, 180 - aB);
                        t5 = isOn(i, aC + 240, 180 - aC);
                        d4 = isOn(i, 180, 180); 
                        d6 = isOn(i, 300, 180); 
                        d2 = isOn(i, 60, 180);  
                    } else if (state.mode === '3p-hw-rev') {
                        d1 = isOn(i, 0, 180);   
                        d3 = isOn(i, 120, 180); 
                        d5 = isOn(i, 240, 180); 
                        t4 = isOn(i, aA + 180, 180 - aA);
                        t6 = isOn(i, aB + 300, 180 - aB);
                        t2 = isOn(i, aC + 60, 180 - aC);
                    }

                    const pA = t1 || d1 || t4 || d4;
                    const pB = t3 || d3 || t6 || d6;
                    const pC = t5 || d5 || t2 || d2;
                    const count = (pA?1:0) + (pB?1:0) + (pC?1:0);
                    
                    const Vn = count > 0 ? ((pA?pt.vA:0) + (pB?pt.vB:0) + (pC?pt.vC:0)) / count : 0;
                    
                    pt.voA = pA ? pt.vA - Vn : 0;
                    pt.voB = pB ? pt.vB - Vn : 0;
                    pt.voC = pC ? pt.vC - Vn : 0;
                    pt.vt1 = pA ? 0 : pt.vA - Vn;

                    Object.assign(pt, {t1, t2, t3, t4, t5, t6, d1, d2, d3, d4, d5, d6});
                }
                arr.push(pt);
            }
            return arr;
        };

        const render = () => {
            const is3P = state.mode.startsWith('3p');
            
            el.modeContainer.innerHTML = MODES.map(m => `
                <button data-mode="${m.id}" class="w-full text-left px-5 py-3 rounded-xl transition-all duration-300 border ${state.mode === m.id ? 'active-btn font-bold scale-[1.02]' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10 hover:text-white'}">
                    ${m.label}
                </button>
            `).join('');

            document.querySelectorAll('#mode-container button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.mode = e.target.closest('button').dataset.mode;
                    render();
                });
            });

            el.circuitDiagram.innerHTML = getCircuitSVG(state.mode);

            if (is3P) {
                el.contUnlink.style.display = 'flex';
                el.contRL.style.display = 'none';
                el.labelA.innerText = state.linked ? "All Phases (α)" : "Phase A (α_A)";
                el.contB.style.opacity = state.linked ? '0.3' : '1';
                el.contC.style.opacity = state.linked ? '0.3' : '1';
                el.contB.style.pointerEvents = state.linked ? 'none' : 'auto';
                el.contC.style.pointerEvents = state.linked ? 'none' : 'auto';
            } else {
                el.contUnlink.style.display = 'none';
                el.contRL.style.display = state.mode === '1p-rl' ? 'block' : 'none';
                el.labelA.innerText = "Firing Angle (α)";
                el.contB.style.opacity = '0';
                el.contC.style.opacity = '0';
                el.contB.style.pointerEvents = 'none';
                el.contC.style.pointerEvents = 'none';
            }

            if (state.linked) {
                state.alphaB = state.alphaA;
                state.alphaC = state.alphaA;
                el.sliderB.value = state.alphaA;
                el.sliderC.value = state.alphaA;
            }

            el.valA.innerText = state.alphaA + '°';
            el.valB.innerText = state.alphaB + '°';
            el.valC.innerText = state.alphaC + '°';
            el.valTheta.innerText = state.theta + '°';

            const data = computeData();
            let svgsHTML = SVG_DEFS; 

            if (is3P) {
                const phaseLines = [
                    { key: 'vA', color: colors.phaseA, width: 2, name: 'v_an' },
                    { key: 'vB', color: colors.phaseB, width: 2, name: 'v_bn' },
                    { key: 'vC', color: colors.phaseC, width: 2, name: 'v_cn' }
                ];
                svgsHTML += buildWaveChart("Source Phase Voltages", data, phaseLines, 160, 80, 50);

                const lineLines = [
                    { key: 'vAB', color: colors.lineVoltAB, width: 2, name: 'v_ab', dash: '4 4' },
                    { key: 'vBC', color: colors.lineVoltBC, width: 2, name: 'v_bc', dash: '4 4' },
                    { key: 'vCA', color: colors.lineVoltCA, width: 2, name: 'v_ca', dash: '4 4' }
                ];
                svgsHTML += buildWaveChart("Source Line Voltages", data, lineLines, 200, 100, 50);
            } else {
                const refLines = [{ key: 'vA', color: colors.phaseA, width: 2.5, name: 'v_s' }];
                svgsHTML += buildWaveChart("Source Voltage", data, refLines, 160, 80, 50);
            }

            let devs = [];
            if (!is3P) {
                devs = [{ key: 't1', label: 'T_1', color: colors.phaseA }];
                if (state.mode !== '1p-hw') devs.push({ key: 't2', label: 'T_2', color: colors.phaseB });
            } else {
                if (state.mode === '3p-hw-std') {
                    devs = [
                        { key: 't1', label: 'T_1 (A+)', color: colors.phaseA },
                        { key: 't3', label: 'T_3 (B+)', color: colors.phaseB },
                        { key: 't5', label: 'T_5 (C+)', color: colors.phaseC },
                        { key: 'd4', label: 'D_4 (A-)', color: '#ff80a6' },
                        { key: 'd6', label: 'D_6 (B-)', color: '#80f8ff' },
                        { key: 'd2', label: 'D_2 (C-)', color: '#80ffb2' }
                    ];
                } else if (state.mode === '3p-hw-rev') {
                    devs = [
                        { key: 't4', label: 'T_4 (A-)', color: colors.phaseA },
                        { key: 't6', label: 'T_6 (B-)', color: colors.phaseB },
                        { key: 't2', label: 'T_2 (C-)', color: colors.phaseC },
                        { key: 'd1', label: 'D_1 (A+)', color: '#ff80a6' },
                        { key: 'd3', label: 'D_3 (B+)', color: '#80f8ff' },
                        { key: 'd5', label: 'D_5 (C+)', color: '#80ffb2' }
                    ];
                } else {
                    devs = [
                        { key: 't1', label: 'T_1 (A+)', color: colors.phaseA },
                        { key: 't3', label: 'T_3 (B+)', color: colors.phaseB },
                        { key: 't5', label: 'T_5 (C+)', color: colors.phaseC },
                        { key: 't4', label: 'T_4 (A-)', color: '#ff80a6' },
                        { key: 't6', label: 'T_6 (B-)', color: '#80f8ff' },
                        { key: 't2', label: 'T_2 (C-)', color: '#80ffb2' }
                    ];
                }
            }
            svgsHTML += buildGanttChart(data, devs);

            const outATitle = is3P && state.mode === '3p-delta' ? 'v_ab' : 'v_an';
            // Restored width down to 2.5 for output waves
            svgsHTML += buildWaveChart(`Output Phase A`, data, [{ key: 'voA', color: colors.phaseA, fill: 'rgba(255, 42, 95, 0.2)', width: 2.5, name: outATitle }]);

            if (is3P) {
                const outBTitle = state.mode === '3p-delta' ? 'v_bc' : 'v_bn';
                const outCTitle = state.mode === '3p-delta' ? 'v_ca' : 'v_cn';
                svgsHTML += buildWaveChart(`Output Phase B`, data, [{ key: 'voB', color: colors.phaseB, fill: 'rgba(0, 240, 255, 0.2)', width: 2.5, name: outBTitle }]);
                svgsHTML += buildWaveChart(`Output Phase C`, data, [{ key: 'voC', color: colors.phaseC, fill: 'rgba(0, 255, 102, 0.2)', width: 2.5, name: outCTitle }]);
            }

            svgsHTML += buildWaveChart("Voltage Across Switch T1", data, [{ key: 'vt1', color: '#a855f7', fill: 'rgba(168, 85, 247, 0.15)', width: 2, name: 'v_T1' }]);

            el.wrapper.innerHTML = svgsHTML;
        };

        el.sliderA.addEventListener('input', e => { state.alphaA = parseInt(e.target.value); render(); });
        el.sliderB.addEventListener('input', e => { state.alphaB = parseInt(e.target.value); render(); });
        el.sliderC.addEventListener('input', e => { state.alphaC = parseInt(e.target.value); render(); });
        el.sliderTheta.addEventListener('input', e => { state.theta = parseInt(e.target.value); render(); });
        
        el.zoomSlider.addEventListener('input', e => {
            state.zoom = parseInt(e.target.value);
            el.zoomLabel.innerText = state.zoom + '%';
            el.wrapper.style.width = `${state.zoom}%`;
            if (state.zoom < 100) {
                el.wrapper.style.minWidth = '0px'; 
            } else {
                el.wrapper.style.minWidth = `${state.zoom * 8}px`; 
            }
        });

        el.checkUnlink.addEventListener('change', e => {
            state.linked = !e.target.checked;
            render();
        });

        render();
    </script>
</body>
</html>
