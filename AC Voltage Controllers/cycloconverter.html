<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycloconverter Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: currentColor;
            margin-top: -5px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .accent-blue::-webkit-slider-thumb { background: #3b82f6; }
        .accent-red::-webkit-slider-thumb { background: #ef4444; }
        .accent-green::-webkit-slider-thumb { background: #10b981; }
        .accent-amber::-webkit-slider-thumb { background: #f59e0b; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-7xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col">
        
        <div class="p-6 border-b-4 border-indigo-500 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-900">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Cycloconverters (AC-to-AC)</h1>
                <p class="text-slate-400 text-sm mt-1">Direct Frequency Conversion Synthesis</p>
            </div>
            <div class="bg-slate-800 px-5 py-3 rounded-xl border border-slate-700 shadow-inner w-full md:w-64">
                <div class="flex justify-between gap-4 mb-2">
                    <span class="font-semibold text-slate-400 text-xs tracking-wider uppercase">Zoom Level</span>
                    <span class="text-indigo-400 font-bold text-sm" id="zoom-label">100%</span>
                </div>
                <input type="range" id="zoom-slider" min="50" max="200" step="5" value="100" class="w-full accent-blue">
            </div>
        </div>

        <div class="p-6 bg-slate-800 border-b border-slate-700 space-y-6">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Topology / Circuit Mode</label>
                <div class="flex flex-wrap gap-2" id="mode-container">
                    <!-- Buttons injected via JS -->
                </div>
            </div>

            <!-- Circuit Diagram Container -->
            <div id="circuit-diagram" class="w-full flex justify-center items-center bg-slate-900 rounded-xl border border-slate-700 py-6 min-h-[160px]">
                <!-- Diagram injected via JS -->
            </div>

            <!-- Angle Controls -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 bg-slate-900 p-5 rounded-xl border border-slate-700">
                
                <div class="flex flex-col">
                    <div class="flex justify-between mb-2">
                        <span class="font-semibold text-sm text-slate-300">P-Converter Firing (α_p)</span>
                        <span class="text-red-400 font-bold" id="val-alphaP">30°</span>
                    </div>
                    <input type="range" id="slider-alphaP" min="0" max="180" step="1" value="30" class="w-full accent-red">
                </div>

                <div class="flex flex-col transition-opacity duration-300" id="container-alphaN">
                    <div class="flex justify-between mb-2">
                        <span class="font-semibold text-sm text-slate-300">N-Converter Firing (α_n)</span>
                        <span class="text-blue-400 font-bold" id="val-alphaN">30°</span>
                    </div>
                    <input type="range" id="slider-alphaN" min="0" max="180" step="1" value="30" class="w-full accent-blue">
                </div>

                <div class="flex flex-col">
                    <div class="flex justify-between mb-2">
                        <span class="font-semibold text-sm text-slate-300">Frequency Ratio (f_s / f_o)</span>
                        <span class="text-emerald-400 font-bold" id="val-freq">3</span>
                    </div>
                    <input type="range" id="slider-freq" min="2" max="6" step="1" value="3" class="w-full accent-green">
                </div>

                <div class="flex flex-col justify-center border-l-2 pl-6 border-slate-700 min-h-[50px]">
                    <label class="flex items-center gap-3 cursor-pointer p-2 hover:bg-slate-800 rounded-lg transition-colors" id="container-unlink">
                        <input type="checkbox" id="check-unlink" class="w-5 h-5 accent-indigo-500 rounded cursor-pointer">
                        <span class="text-sm font-bold text-slate-300 tracking-wide uppercase">Unlink P & N</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="w-full bg-slate-900 overflow-x-auto p-4 custom-scrollbar text-center">
            <div id="svg-wrapper" style="margin: 0 auto; width: 100%; min-width: 800px; transition: width 0.2s ease-out, min-width 0.2s ease-out;">
                <!-- SVGs injected via JS -->
            </div>
        </div>
        
        <div class="bg-slate-900 text-right p-4 text-slate-500 font-medium text-sm rounded-b-2xl">
            Mahmudul Hasan (2202156)
        </div>
    </div>

            if (mode === '1p1p') {

        const buildWaveChart = (title, data, lines, maxDeg, height = 160, center = 80, scale = 55) => {
            let svg = `<svg viewBox="0 0 ${maxDeg} ${height}" class="w-full h-auto overflow-visible mb-8 block text-left" style="min-height: ${height}px;">`;
            
            // X-Axis Grid & Labels (Every 90 degrees)
            for(let deg = 0; deg <= maxDeg; deg += 90) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="#334155" stroke-dasharray="2 2" stroke-width="0.5"/>`;
                if(deg % 180 === 0) {
                    let label = (deg === 0) ? '0' : (deg/180 === 1 ? 'π' : `${deg/180}π`);
                    svg += `<text x="${deg === 0 ? 2 : deg + 2}" y="${height - 4}" fill="#64748b" font-size="${maxDeg > 1000 ? 12 : 9}" font-weight="500" font-family="sans-serif">${label}</text>`;
                }
            }

            svg += `<line x1="0" y1="${center}" x2="${maxDeg}" y2="${center}" stroke="#475569" stroke-width="1"/>`;
            svg += `<text x="0" y="15" fill="#cbd5e1" font-size="${maxDeg > 1000 ? 18 : 12}" font-weight="bold" font-family="sans-serif">${formatText(title)}</text>`;

            let legX = maxDeg - 10;
            [...lines].reverse().forEach(line => {
                if(line.name) {
                    legX -= (maxDeg > 1000 ? 70 : 40);
                    svg += `<text x="${legX + 15}" y="15" fill="${line.color}" font-size="${maxDeg > 1000 ? 16 : 11}" font-weight="bold" font-family="sans-serif">${formatText(line.name)}</text>`;
                    svg += `<line x1="${legX}" y1="12" x2="${legX + 10}" y2="12" stroke="${line.color}" stroke-width="3" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''}/>`;
                }
            });

            lines.forEach(line => {
                if (!data.length) return;
                let d = `M 0 ${center - (data[0][line.key] || 0) * scale}`;
                for (let i = 1; i <= maxDeg; i++) {
                    const val = data[i][line.key] || 0;
                    const prevVal = data[i - 1][line.key] || 0;
                    const y = center - val * scale;
                    const prevY = center - prevVal * scale;
                    
                    if (Math.abs(y - prevY) > scale * 0.15) {
                        d += ` L ${i} ${prevY}`;
                    }
                    d += ` L ${i} ${y}`;
                }
                
                if (line.fill) {
                    svg += `<path d="${d} L ${maxDeg} ${center} L 0 ${center} Z" fill="${line.fill}" />`;
                }
                svg += `<path d="${d}" fill="none" stroke="${line.color}" stroke-width="${line.width || 2}" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''} stroke-linejoin="round" />`;
            });
            svg += `</svg>`;
            return svg;
        };

        const getBlocks = (data, key, maxDeg) => {
            const blocks = [];
            let start = null;
            for (let i = 0; i <= maxDeg; i++) {
                if (data[i] && data[i][key] && start === null) start = i;
                if (data[i] && !data[i][key] && start !== null) {
                    blocks.push({ s: start, e: i });
                    start = null;
                }
            }
            if (start !== null) blocks.push({ s: start, e: maxDeg });
            return blocks;
        };

        const buildGanttChart = (data, devices, maxDeg) => {
            const rowHeight = maxDeg > 1000 ? 30 : 22;
            const height = devices.length * rowHeight + 35;
            let svg = `<svg viewBox="0 0 ${maxDeg} ${height}" class="w-full h-auto overflow-visible mb-8 block text-left" style="min-height: ${height}px;">`;
            
            for(let deg = 0; deg <= maxDeg; deg += 90) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="#334155" stroke-dasharray="2 2" stroke-width="0.5"/>`;
            }
            
            svg += `<text x="0" y="15" fill="#cbd5e1" font-size="${maxDeg > 1000 ? 18 : 12}" font-weight="bold" font-family="sans-serif">Cycloconverter Firing Sequence</text>`;

            devices.forEach((dev, idx) => {
                const y = idx * rowHeight + 25;
                svg += `<text x="0" y="${y + (maxDeg > 1000 ? 18 : 11)}" fill="${dev.color}" font-size="${maxDeg > 1000 ? 14 : 9}" font-weight="bold" font-family="sans-serif">${formatText(dev.label)}</text>`;
                const blocks = getBlocks(data, dev.key, maxDeg);
                blocks.forEach(b => {
                    svg += `<rect x="${b.s}" y="${y}" width="${b.e - b.s}" height="${maxDeg > 1000 ? 20 : 14}" fill="${dev.color}" opacity="0.85" rx="2" />`;
                });
            });
            svg += `</svg>`;
            return svg;
        };

        const computeData = () => {
            const arr = [];
            const maxDeg = state.freqRatio * 360;
            const halfCycle = maxDeg / 2;
            const aP = state.alphaP;
            const aN = state.linked ? aP : state.alphaN;

            let activeP = null;
            let activeN = null;

            // Pre-run to establish valid initial thyristor states across the phase wrap-around
            for (let i = -360; i <= maxDeg; i++) {
                let mod360 = (i % 360 + 360) % 360;
                let vA = Math.sin(toRad(i));
                let vB = Math.sin(toRad(i - 120));
                let vC = Math.sin(toRad(i - 240));

                if (state.mode === '3p1p-hw') {
                    // Triggers
                    if (mod360 === (30 + aP) % 360) activeP = 'A';
                    if (mod360 === (150 + aP) % 360) activeP = 'B';
                    if (mod360 === (270 + aP) % 360) activeP = 'C';

                    if (mod360 === (210 + aN) % 360) activeN = 'A';
                    if (mod360 === (330 + aN) % 360) activeN = 'B';
                    if (mod360 === (90 + aN) % 360) activeN = 'C';

                    // Resistive load extinction
                    if (activeP === 'A' && vA < 0) activeP = null;
                    if (activeP === 'B' && vB < 0) activeP = null;
                    if (activeP === 'C' && vC < 0) activeP = null;

                    if (activeN === 'A' && vA > 0) activeN = null;
                    if (activeN === 'B' && vB > 0) activeN = null;
                    if (activeN === 'C' && vC > 0) activeN = null;

                    if (i >= 0) {
                        let vo = 0;
                        let isP = (i < halfCycle);
                        
                        if (isP) {
                            if (activeP === 'A') vo = vA;
                            if (activeP === 'B') vo = vB;
                            if (activeP === 'C') vo = vC;
                        } else {
                            if (activeN === 'A') vo = vA;
                            if (activeN === 'B') vo = vB;
                            if (activeN === 'C') vo = vC;
                        }
                        arr.push({ deg: i, vA, vB, vC, vo, pActive: isP, nActive: !isP, pA: activeP==='A', pB: activeP==='B', pC: activeP==='C', nA: activeN==='A', nB: activeN==='B', nC: activeN==='C' });
                    }
                } 
                else if (state.mode === '1p1p') {
                    if (i >= 0) {
                        let vo = 0;
                        let mod180 = i % 180;
                        let isP = (i < halfCycle);
                        
                        if (isP) {
                            if (mod180 >= aP) vo = (i % 360 < 180) ? vA : -vA;
                        } else {
                            if (mod180 >= aN) vo = (i % 360 < 180) ? -vA : vA;
                        }
                        
                        // Deriving conduction states for 1p bridge
                        let t13 = isP && (mod180 >= aP) && (i % 360 < 180);
                        let t24 = isP && (mod180 >= aP) && (i % 360 >= 180);
                        let t13_n = !isP && (mod180 >= aN) && (i % 360 < 180);
                        let t24_n = !isP && (mod180 >= aN) && (i % 360 >= 180);

                        arr.push({ deg: i, vA, vo, pActive: isP, nActive: !isP, t13, t24, t13_n, t24_n });
                    }
                }
            }
            return { data: arr, maxDeg };
        };

        const render = () => {
            el.modeContainer.innerHTML = MODES.map(m => `
                <button data-mode="${m.id}" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all ${state.mode === m.id ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${m.label}</button>
            `).join('');

            document.querySelectorAll('#mode-container button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.mode = e.target.dataset.mode;
                    render();
                });
            });

            el.circuitDiagram.innerHTML = getCircuitSVG(state.mode);

            if (state.linked) {
                state.alphaN = state.alphaP;
                el.sliderN.value = state.alphaP;
            }

            el.contN.style.opacity = state.linked ? '0.3' : '1';
            el.contN.style.pointerEvents = state.linked ? 'none' : 'auto';

            el.valP.innerText = state.alphaP + '°';
            el.valN.innerText = state.alphaN + '°';
            el.valFreq.innerText = state.freqRatio;

            const { data, maxDeg } = computeData();
            let svgsHTML = "";

            if (state.mode === '3p1p-hw') {
                svgsHTML += buildWaveChart("Source Voltages", data, [
                    { key: 'vA', color: '#ef4444', name: 'v_an' },
                    { key: 'vB', color: '#3b82f6', name: 'v_bn' },
                    { key: 'vC', color: '#10b981', name: 'v_cn' }
                ], maxDeg);

                svgsHTML += buildGanttChart(data, [
                    { key: 'pActive', label: 'P-Converter Active', color: '#6366f1' },
                    { key: 'nActive', label: 'N-Converter Active', color: '#8b5cf6' },
                    { key: 'pA', label: 'T_1 (Phase A+)', color: '#ef4444' },
                    { key: 'pB', label: 'T_3 (Phase B+)', color: '#3b82f6' },
                    { key: 'pC', label: 'T_5 (Phase C+)', color: '#10b981' },
                    { key: 'nA', label: 'T_1\' (Phase A-)', color: '#fca5a5' },
                    { key: 'nB', label: 'T_3\' (Phase B-)', color: '#93c5fd' },
                    { key: 'nC', label: 'T_5\' (Phase C-)', color: '#6ee7b7' }
                ], maxDeg);
            } else {
                svgsHTML += buildWaveChart("Source Voltage", data, [
                    { key: 'vA', color: '#ef4444', name: 'v_s' }
                ], maxDeg);

                svgsHTML += buildGanttChart(data, [
                    { key: 'pActive', label: 'P-Converter Active', color: '#6366f1' },
                    { key: 'nActive', label: 'N-Converter Active', color: '#8b5cf6' },
                    { key: 't13', label: 'T_1 & T_3', color: '#ef4444' },
                    { key: 't24', label: 'T_4 & T_2', color: '#fca5a5' },
                    { key: 't13_n', label: 'T_1\' & T_3\'', color: '#3b82f6' },
                    { key: 't24_n', label: 'T_4\' & T_2\'', color: '#93c5fd' }
                ], maxDeg);
            }

            svgsHTML += buildWaveChart(`Synthesized Output Voltage (vo)`, data, [
                { key: 'vo', color: '#eab308', fill: 'rgba(234, 179, 8, 0.15)', width: 3, name: 'v_o' }
            ], maxDeg, 200, 100, 80);

            el.wrapper.innerHTML = svgsHTML;
        };

        el.sliderP.addEventListener('input', e => { state.alphaP = parseInt(e.target.value); render(); });
        el.sliderN.addEventListener('input', e => { state.alphaN = parseInt(e.target.value); render(); });
        el.sliderFreq.addEventListener('input', e => { state.freqRatio = parseInt(e.target.value); render(); });
        
        el.zoomSlider.addEventListener('input', e => {
            state.zoom = parseInt(e.target.value);
            el.zoomLabel.innerText = state.zoom + '%';
            el.wrapper.style.width = `${state.zoom}%`;
            if (state.zoom < 100) el.wrapper.style.minWidth = '0px'; 
            else el.wrapper.style.minWidth = `${state.zoom * 8}px`; 
        });

        el.checkUnlink.addEventListener('change', e => {
            state.linked = !e.target.checked;
            render();
        });

        render();

    </script>
</body>
</html>
