<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycloconverter Simulator - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Color Palette Variables for easy management */
        :root {
            --bg-deep: #050505;
            --bg-glow: #0a0f1c;
            --phase-a: #ff2a5f; /* Neon Rose/Red for P-Converter & Phase A */
            --phase-b: #00f0ff; /* Electric Cyan for N-Converter & Phase B */
            --phase-c: #00ff66; /* Neon Green for Freq Ratio & Phase C */
            --grid-line: rgba(255, 255, 255, 0.07);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-amber: #f59e0b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top, var(--bg-glow) 0%, var(--bg-deep) 100%);
            color: #f8fafc; 
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .dot-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #fff;
            margin-top: -6.5px;
            cursor: pointer;
            box-shadow: 0 0 10px currentColor, 0 0 5px rgba(255,255,255,0.8);
            border: 2px solid currentColor;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        .slider-p { color: var(--phase-a); }
        .slider-n { color: var(--phase-b); }
        .slider-freq { color: var(--phase-c); }
        .slider-zoom { color: #a855f7; }
        
        svg path { transition: d 0.1s ease-out; }
        
        .active-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3), inset 0 0 10px rgba(99, 102, 241, 0.2);
            color: #fff;
        }

        /* Toggle switch styling */
        input:checked ~ .toggle-bg { background-color: rgba(99, 102, 241, 0.3); border-color: #6366f1; }
        input:checked ~ .toggle-dot { transform: translateX(100%); background-color: #818cf8; box-shadow: 0 0 10px #818cf8; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-[1400px] flex flex-col gap-6">
        
        <!-- Header Section -->
        <div class="glass-panel rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full animate-[shimmer_3s_infinite]"></div>
            
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                    Cycloconverters (AC-to-AC)
                </h1>
                <p class="text-slate-400 text-sm mt-1 font-medium tracking-wide">Direct Frequency Conversion Synthesis</p>
            </div>
            
            <div class="glass-panel px-6 py-4 rounded-xl w-full md:w-72 border-white/5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase flex items-center gap-2">
                        <svg class="w-3 h-3 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                        Oscilloscope Zoom
                    </span>
                    <span class="mono text-purple-400 font-bold text-sm bg-purple-500/10 px-2 py-1 rounded-md" id="zoom-label">100%</span>
                </div>
                <input type="range" id="zoom-slider" min="50" max="200" step="5" value="100" class="slider-zoom">
            </div>
        </div>

        <!-- Controls Row -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Topology Selector (1/4 Width) -->
            <div class="glass-panel rounded-2xl p-5">
                <label class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">
                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Circuit Topology
                </label>
                <div class="flex flex-col gap-3" id="mode-container">
                    <!-- Buttons injected via JS -->
                </div>
            </div>

            <!-- Configuration Controls (3/4 Width) -->
            <div class="glass-panel rounded-2xl p-5 lg:col-span-3 flex flex-col justify-center">
                <div class="flex justify-between items-center mb-6">
                    <label class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <svg class="w-4 h-4 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        Firing & Frequency Control
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group" id="container-unlink">
                        <span class="text-xs font-bold text-slate-500 group-hover:text-slate-300 transition-colors uppercase tracking-wider">Unlink P & N</span>
                        <div class="relative">
                            <input type="checkbox" id="check-unlink" class="sr-only">
                            <div class="block bg-slate-800 border border-slate-600 w-10 h-6 rounded-full transition-colors toggle-bg"></div>
                            <div class="dot absolute left-1 top-1 bg-slate-400 w-4 h-4 rounded-full transition-transform toggle-dot"></div>
                        </div>
                    </label>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- P-Converter Angle -->
                    <div class="bg-black/20 p-4 rounded-xl border border-[#ff2a5f]/20 shadow-[inset_0_0_20px_rgba(255,42,95,0.05)]">
                        <div class="flex justify-between mb-3">
                            <span class="text-xs font-bold text-[#ff2a5f] uppercase tracking-wider">P-Converter (α_p)</span>
                            <span class="mono text-[#ff2a5f] font-bold bg-[#ff2a5f]/10 px-2 py-0.5 rounded" id="val-alphaP">30°</span>
                        </div>
                        <input type="range" id="slider-alphaP" min="0" max="180" step="1" value="30" class="slider-p">
                    </div>

                    <!-- N-Converter Angle -->
                    <div class="bg-black/20 p-4 rounded-xl border border-[#00f0ff]/20 shadow-[inset_0_0_20px_rgba(0,240,255,0.05)] transition-opacity duration-300" id="container-alphaN">
                        <div class="flex justify-between mb-3">
                            <span class="text-xs font-bold text-[#00f0ff] uppercase tracking-wider">N-Converter (α_n)</span>
                            <span class="mono text-[#00f0ff] font-bold bg-[#00f0ff]/10 px-2 py-0.5 rounded" id="val-alphaN">30°</span>
                        </div>
                        <input type="range" id="slider-alphaN" min="0" max="180" step="1" value="30" class="slider-n">
                    </div>

                    <!-- Frequency Ratio -->
                    <div class="bg-black/20 p-4 rounded-xl border border-[#00ff66]/20 shadow-[inset_0_0_20px_rgba(0,255,102,0.05)]">
                        <div class="flex justify-between mb-3">
                            <span class="text-xs font-bold text-[#00ff66] uppercase tracking-wider">Freq Ratio (fs/fo)</span>
                            <span class="mono text-[#00ff66] font-bold bg-[#00ff66]/10 px-2 py-0.5 rounded" id="val-freq">3</span>
                        </div>
                        <input type="range" id="slider-freq" min="2" max="6" step="1" value="3" class="slider-freq">
                    </div>
                </div>
            </div>
        </div>

        <!-- Full Width Schematic Display -->
        <div class="glass-panel rounded-2xl p-5 flex flex-col w-full">
            <label class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">
                <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                Schematic Blueprint
            </label>
            <div id="circuit-diagram" class="w-full flex justify-center items-center bg-black/40 rounded-xl border border-white/5 py-8 dot-grid min-h-[220px]">
                <!-- Diagram injected via JS -->
            </div>
        </div>

        <!-- Full Width Waveform Display Area -->
        <div class="glass-panel rounded-2xl p-1 flex-grow overflow-hidden flex flex-col border-t border-t-white/10 relative shadow-[0_0_50px_rgba(0,240,255,0.05)]">
            <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.1)_50%)] bg-[length:100%_4px] z-10 opacity-30"></div>
            
            <div class="w-full h-full overflow-x-auto p-4 custom-scrollbar text-center relative z-0">
                <div id="svg-wrapper" style="margin: 0 auto; width: 100%; min-width: 800px; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.3s;">
                    <!-- SVGs injected via JS -->
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center p-4 text-slate-500 font-medium text-sm tracking-widest mt-2">
            Mahmudul Hasan (2202156)
        </div>
    </div>

    <script>
        const MODES = [
            { id: '1p1p', label: '1Φ to 1Φ (Bridge)' },
            { id: '3p1p-hw', label: '3Φ to 1Φ (Half-Wave)' }
        ];

        const state = {
            mode: '1p1p',
            linked: true,
            alphaP: 30,
            alphaN: 30,
            freqRatio: 3,
            zoom: 100
        };

        const el = {
            modeContainer: document.getElementById('mode-container'),
            circuitDiagram: document.getElementById('circuit-diagram'),
            zoomSlider: document.getElementById('zoom-slider'),
            zoomLabel: document.getElementById('zoom-label'),
            sliderP: document.getElementById('slider-alphaP'),
            sliderN: document.getElementById('slider-alphaN'),
            sliderFreq: document.getElementById('slider-freq'),
            valP: document.getElementById('val-alphaP'),
            valN: document.getElementById('val-alphaN'),
            valFreq: document.getElementById('val-freq'),
            contN: document.getElementById('container-alphaN'),
            checkUnlink: document.getElementById('check-unlink'),
            wrapper: document.getElementById('svg-wrapper')
        };

        const colors = {
            phaseA: '#ff2a5f',
            phaseB: '#00f0ff',
            phaseC: '#00ff66',
            grid: 'rgba(255, 255, 255, 0.1)',
            text: '#94a3b8',
            wire: '#475569',
            load: '#818cf8',
            vo: '#f59e0b',
            pConv: '#ff2a5f',
            nConv: '#00f0ff'
        };

        const toRad = (deg) => (deg * Math.PI) / 180;

        const formatText = (text) => {
            return text.replace(/_([a-zA-Z0-9']+)/g, '<tspan font-size="0.7em" dy="4">$1</tspan><tspan dy="-4"></tspan>');
        };

        const SVG_DEFS = `<svg width="0" height="0" class="hidden">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="glow-intense" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3.5" result="blur1" />
                    <feGaussianBlur stdDeviation="1" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur1" />
                        <feMergeNode in="blur2" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <g id="thy-r">
                    <polygon points="-10,-10 10,0 -10,10" fill="currentColor"/>
                    <line x1="10" y1="-10" x2="10" y2="10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="-20" y1="0" x2="-10" y2="0" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="10" y1="0" x2="20" y2="0" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M 0,5 L -5,15" stroke="currentColor" stroke-width="2.5" fill="none"/>
                    <circle cx="-5" cy="15" r="1.5" fill="currentColor"/>
                </g>
                <g id="thy-l">
                    <polygon points="10,-10 -10,0 10,10" fill="currentColor"/>
                    <line x1="-10" y1="-10" x2="-10" y2="10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="-20" y1="0" x2="-10" y2="0" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="10" y1="0" x2="20" y2="0" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M 0,5 L 5,15" stroke="currentColor" stroke-width="2.5" fill="none"/>
                    <circle cx="5" cy="15" r="1.5" fill="currentColor"/>
                </g>
                <g id="thy-d">
                    <polygon points="-10,-10 10,-10 0,10" fill="currentColor"/>
                    <line x1="-10" y1="10" x2="10" y2="10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="0" y1="-20" x2="0" y2="-10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="0" y1="10" x2="0" y2="20" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M 5,0 L 15,-5" stroke="currentColor" stroke-width="2.5" fill="none"/>
                    <circle cx="15" cy="-5" r="1.5" fill="currentColor"/>
                </g>
                <g id="thy-u">
                    <polygon points="-10,10 10,10 0,-10" fill="currentColor"/>
                    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="0" y1="-20" x2="0" y2="-10" stroke="currentColor" stroke-width="2.5"/>
                    <line x1="0" y1="10" x2="0" y2="20" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M 5,0 L 15,5" stroke="currentColor" stroke-width="2.5" fill="none"/>
                    <circle cx="15" cy="5" r="1.5" fill="currentColor"/>
                </g>
                <g id="ac-source">
                    <circle cx="0" cy="0" r="18" fill="rgba(0,0,0,0.5)" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M -10,0 Q -5,-10 0,0 T 10,0" fill="none" stroke="currentColor" stroke-width="2"/>
                </g>
            </defs>
        </svg>`;

        const getCircuitSVG = (mode) => {
            let result = SVG_DEFS;

            if (mode === '1p1p') {
                result += `<svg viewBox="0 0 800 350" class="w-full h-auto max-h-[350px]">
                    <!-- AC Source -->
                    <use href="#ac-source" x="80" y="175" class="text-slate-300"/>
                    <text x="40" y="180" fill="${colors.text}" font-size="16" font-weight="bold">Vs</text>
                    
                    <!-- Source Lines -->
                    <path d="M 80,157 L 80,80 L 720,80" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <path d="M 80,193 L 80,270 L 720,270" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    
                    <!-- P-Converter Bridge (Left) -->
                    <rect x="200" y="60" width="160" height="230" fill="none" stroke="${colors.pConv}" stroke-width="2" stroke-dasharray="4" rx="8" opacity="0.6"/>
                    <text x="280" y="50" fill="${colors.pConv}" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">P-Converter</text>
                    
                    <!-- P Left Leg -->
                    <path d="M 240,80 L 240,110 M 240,150 L 240,200 M 240,240 L 240,270" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-d" x="240" y="130" fill="${colors.pConv}" stroke="${colors.pConv}" filter="url(#glow)"/> <text x="215" y="135" fill="${colors.pConv}" font-size="12" font-weight="bold">T1</text>
                    <use href="#thy-d" x="240" y="220" fill="${colors.pConv}" stroke="${colors.pConv}" filter="url(#glow)"/> <text x="215" y="225" fill="${colors.pConv}" font-size="12" font-weight="bold">T4</text>
                    
                    <!-- P Right Leg -->
                    <path d="M 320,80 L 320,110 M 320,150 L 320,200 M 320,240 L 320,270" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-d" x="320" y="130" fill="${colors.pConv}" stroke="${colors.pConv}" filter="url(#glow)"/> <text x="340" y="135" fill="${colors.pConv}" font-size="12" font-weight="bold">T3</text>
                    <use href="#thy-d" x="320" y="220" fill="${colors.pConv}" stroke="${colors.pConv}" filter="url(#glow)"/> <text x="340" y="225" fill="${colors.pConv}" font-size="12" font-weight="bold">T2</text>
                    
                    <!-- Load -->
                    <path d="M 240,175 L 560,175" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <rect x="380" y="155" width="40" height="40" fill="rgba(15,23,42,0.8)" stroke="${colors.load}" stroke-width="2" rx="4"/>
                    <text x="400" y="179" fill="${colors.load}" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#glow)">Load</text>
                    
                    <!-- N-Converter Bridge (Right) - Anti-parallel (Diodes point UP) -->
                    <rect x="440" y="60" width="160" height="230" fill="none" stroke="${colors.nConv}" stroke-width="2" stroke-dasharray="4" rx="8" opacity="0.6"/>
                    <text x="520" y="50" fill="${colors.nConv}" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">N-Converter</text>

                    <!-- N Left Leg -->
                    <path d="M 480,80 L 480,110 M 480,150 L 480,200 M 480,240 L 480,270" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-u" x="480" y="130" fill="${colors.nConv}" stroke="${colors.nConv}" filter="url(#glow)"/> <text x="455" y="135" fill="${colors.nConv}" font-size="12" font-weight="bold">T1'</text>
                    <use href="#thy-u" x="480" y="220" fill="${colors.nConv}" stroke="${colors.nConv}" filter="url(#glow)"/> <text x="455" y="225" fill="${colors.nConv}" font-size="12" font-weight="bold">T4'</text>

                    <!-- N Right Leg -->
                    <path d="M 560,80 L 560,110 M 560,150 L 560,200 M 560,240 L 560,270" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-u" x="560" y="130" fill="${colors.nConv}" stroke="${colors.nConv}" filter="url(#glow)"/> <text x="580" y="135" fill="${colors.nConv}" font-size="12" font-weight="bold">T3'</text>
                    <use href="#thy-u" x="560" y="220" fill="${colors.nConv}" stroke="${colors.nConv}" filter="url(#glow)"/> <text x="580" y="225" fill="${colors.nConv}" font-size="12" font-weight="bold">T2'</text>
                    
                    <!-- Junction Dots -->
                    <circle cx="240" cy="80" r="4" fill="${colors.wire}"/> <circle cx="320" cy="80" r="4" fill="${colors.wire}"/>
                    <circle cx="480" cy="80" r="4" fill="${colors.wire}"/> <circle cx="560" cy="80" r="4" fill="${colors.wire}"/>
                    <circle cx="240" cy="270" r="4" fill="${colors.wire}"/> <circle cx="320" cy="270" r="4" fill="${colors.wire}"/>
                    <circle cx="480" cy="270" r="4" fill="${colors.wire}"/> <circle cx="560" cy="270" r="4" fill="${colors.wire}"/>
                    <circle cx="240" cy="175" r="4" fill="${colors.wire}"/> <circle cx="320" cy="175" r="4" fill="${colors.wire}"/>
                    <circle cx="480" cy="175" r="4" fill="${colors.wire}"/> <circle cx="560" cy="175" r="4" fill="${colors.wire}"/>
                </svg>`;
            } 
            else if (mode === '3p1p-hw') {
                result += `<svg viewBox="0 0 800 350" class="w-full h-auto max-h-[400px]">
                    <!-- Input lines and labels -->
                    <text x="40" y="159" fill="${colors.phaseA}" font-size="14" font-weight="bold" filter="url(#glow)">A</text>
                    <circle cx="60" cy="155" r="3" fill="${colors.wire}"/>
                    <path d="M 60,155 L 640,155" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    
                    <text x="40" y="174" fill="${colors.phaseB}" font-size="14" font-weight="bold" filter="url(#glow)">B</text>
                    <circle cx="60" cy="170" r="3" fill="${colors.wire}"/>
                    <path d="M 60,170 L 640,170" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    
                    <text x="40" y="189" fill="${colors.phaseC}" font-size="14" font-weight="bold" filter="url(#glow)">C</text>
                    <circle cx="60" cy="185" r="3" fill="${colors.wire}"/>
                    <path d="M 60,185 L 640,185" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    
                    <text x="650" y="159" fill="${colors.phaseC}" font-size="14" font-weight="bold">C</text>
                    <text x="650" y="174" fill="${colors.phaseB}" font-size="14" font-weight="bold">B</text>
                    <text x="650" y="189" fill="${colors.phaseA}" font-size="14" font-weight="bold">A</text>

                    <!-- P-Converter Dashed Box -->
                    <rect x="140" y="30" width="220" height="280" fill="none" stroke="${colors.pConv}" stroke-width="2" stroke-dasharray="6 4" rx="8" opacity="0.6"/>
                    <text x="250" y="20" fill="${colors.pConv}" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">P-converter</text>
                    
                    <!-- P-Converter Rails -->
                    <path d="M 190,50 L 400,50" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <path d="M 190,290 L 400,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    
                    <!-- P-Converter Leg 1 (A) -->
                    <path d="M 190,50 L 190,80 M 190,120 L 190,220 M 190,260 L 190,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-u" x="190" y="100" fill="${colors.phaseA}" stroke="${colors.phaseA}" filter="url(#glow)"/> <text x="165" y="105" fill="${colors.phaseA}" font-size="12" font-weight="bold">T1</text>
                    <use href="#thy-u" x="190" y="240" fill="${colors.phaseA}" stroke="${colors.phaseA}" opacity="0.5"/> <text x="165" y="245" fill="${colors.phaseA}" font-size="12" font-weight="bold">T4</text>
                    <circle cx="190" cy="155" r="4" fill="${colors.wire}"/>
                    
                    <!-- P-Converter Leg 2 (B) -->
                    <path d="M 250,50 L 250,80 M 250,120 L 250,220 M 250,260 L 250,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-u" x="250" y="100" fill="${colors.phaseB}" stroke="${colors.phaseB}" filter="url(#glow)"/> <text x="225" y="105" fill="${colors.phaseB}" font-size="12" font-weight="bold">T3</text>
                    <use href="#thy-u" x="250" y="240" fill="${colors.phaseB}" stroke="${colors.phaseB}" opacity="0.5"/> <text x="225" y="245" fill="${colors.phaseB}" font-size="12" font-weight="bold">T6</text>
                    <circle cx="250" cy="170" r="4" fill="${colors.wire}"/>

                    <!-- P-Converter Leg 3 (C) -->
                    <path d="M 310,50 L 310,80 M 310,120 L 310,220 M 310,260 L 310,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-u" x="310" y="100" fill="${colors.phaseC}" stroke="${colors.phaseC}" filter="url(#glow)"/> <text x="285" y="105" fill="${colors.phaseC}" font-size="12" font-weight="bold">T5</text>
                    <use href="#thy-u" x="310" y="240" fill="${colors.phaseC}" stroke="${colors.phaseC}" opacity="0.5"/> <text x="285" y="245" fill="${colors.phaseC}" font-size="12" font-weight="bold">T2</text>
                    <circle cx="310" cy="185" r="4" fill="${colors.wire}"/>

                    <!-- N-Converter Dashed Box -->
                    <rect x="440" y="30" width="220" height="280" fill="none" stroke="${colors.nConv}" stroke-width="2" stroke-dasharray="6 4" rx="8" opacity="0.6"/>
                    <text x="550" y="20" fill="${colors.nConv}" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">N-converter</text>
                    
                    <!-- N-Converter Rails -->
                    <path d="M 400,50 L 610,50" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <path d="M 400,290 L 610,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>

                    <!-- N-Converter Leg 1 (C) -->
                    <path d="M 490,50 L 490,80 M 490,120 L 490,220 M 490,260 L 490,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-d" x="490" y="100" fill="${colors.phaseC}" stroke="${colors.phaseC}" filter="url(#glow)"/> <text x="505" y="105" fill="${colors.phaseC}" font-size="12" font-weight="bold">T2'</text>
                    <use href="#thy-d" x="490" y="240" fill="${colors.phaseC}" stroke="${colors.phaseC}" opacity="0.5"/> <text x="505" y="245" fill="${colors.phaseC}" font-size="12" font-weight="bold">T5'</text>
                    <circle cx="490" cy="185" r="4" fill="${colors.wire}"/>
                    
                    <!-- N-Converter Leg 2 (B) -->
                    <path d="M 550,50 L 550,80 M 550,120 L 550,220 M 550,260 L 550,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-d" x="550" y="100" fill="${colors.phaseB}" stroke="${colors.phaseB}" filter="url(#glow)"/> <text x="565" y="105" fill="${colors.phaseB}" font-size="12" font-weight="bold">T6'</text>
                    <use href="#thy-d" x="550" y="240" fill="${colors.phaseB}" stroke="${colors.phaseB}" opacity="0.5"/> <text x="565" y="245" fill="${colors.phaseB}" font-size="12" font-weight="bold">T3'</text>
                    <circle cx="550" cy="170" r="4" fill="${colors.wire}"/>

                    <!-- N-Converter Leg 3 (A) -->
                    <path d="M 610,50 L 610,80 M 610,120 L 610,220 M 610,260 L 610,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <use href="#thy-d" x="610" y="100" fill="${colors.phaseA}" stroke="${colors.phaseA}" filter="url(#glow)"/> <text x="625" y="105" fill="${colors.phaseA}" font-size="12" font-weight="bold">T4'</text>
                    <use href="#thy-d" x="610" y="240" fill="${colors.phaseA}" stroke="${colors.phaseA}" opacity="0.5"/> <text x="625" y="245" fill="${colors.phaseA}" font-size="12" font-weight="bold">T1'</text>
                    <circle cx="610" cy="155" r="4" fill="${colors.wire}"/>

                    <!-- Load -->
                    <path d="M 400,50 L 400,145" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <path d="M 400,195 L 400,290" fill="none" stroke="${colors.wire}" stroke-width="2"/>
                    <rect x="375" y="145" width="50" height="50" fill="rgba(15,23,42,0.8)" stroke="${colors.load}" stroke-width="2" rx="4"/>
                    <text x="400" y="174" fill="${colors.load}" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#glow)">Load</text>
                    
                    <!-- P-Converter current ip -->
                    <path d="M 350,50 L 365,50" fill="none" stroke="${colors.pConv}" stroke-width="2"/>
                    <path d="M 360,45 L 365,50 L 360,55" fill="none" stroke="${colors.pConv}" stroke-width="2"/>
                    <text x="345" y="40" fill="${colors.pConv}" font-size="12" font-style="italic" font-weight="bold" filter="url(#glow)">${formatText('i_p')}</text>
                    
                    <!-- N-Converter current in -->
                    <path d="M 450,50 L 435,50" fill="none" stroke="${colors.nConv}" stroke-width="2"/>
                    <path d="M 440,45 L 435,50 L 440,55" fill="none" stroke="${colors.nConv}" stroke-width="2"/>
                    <text x="445" y="40" fill="${colors.nConv}" font-size="12" font-style="italic" font-weight="bold" filter="url(#glow)">${formatText('i_n')}</text>
                    
                    <!-- Load current io -->
                    <path d="M 410,110 L 415,115 L 420,110" fill="none" stroke="${colors.load}" stroke-width="2"/>
                    <text x="425" y="112" fill="${colors.load}" font-size="12" font-style="italic" font-weight="bold">${formatText('i_o')}</text>

                    <!-- Polarities -->
                    <text x="355" y="140" fill="${colors.text}" font-size="14" font-weight="bold">+</text>
                    <text x="355" y="205" fill="${colors.text}" font-size="16" font-weight="bold">-</text>
                    <text x="345" y="174" fill="${colors.text}" font-size="12" font-weight="bold">${formatText('v_o1')}</text>
                    
                    <text x="440" y="205" fill="${colors.text}" font-size="14" font-weight="bold">+</text>
                    <text x="440" y="140" fill="${colors.text}" font-size="16" font-weight="bold">-</text>
                    <text x="445" y="174" fill="${colors.text}" font-size="12" font-weight="bold">${formatText('v_o2')}</text>
                </svg>`;
            }
            return result;
        };

        const buildWaveChart = (title, data, lines, maxDeg, height = 150, center = 75, scale = 50) => {
            let svg = `<svg viewBox="0 0 ${maxDeg} ${height}" class="w-full h-auto overflow-visible mb-6 block text-left" style="min-height: ${height}px;">`;
            
            for(let deg = 0; deg <= maxDeg; deg += 90) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="${colors.grid}" stroke-dasharray="2 2" stroke-width="${maxDeg > 1000 ? 1.5 : 1}"/>`;
                if(deg % 180 === 0) {
                    let label = (deg === 0) ? '0' : (deg/180 === 1 ? 'π' : `${deg/180}π`);
                    svg += `<text x="${deg === 0 ? 2 : deg + 2}" y="${height - 4}" fill="#475569" font-size="${maxDeg > 1000 ? 18 : 10}" font-family="'JetBrains Mono', monospace">${label}</text>`;
                }
            }

            svg += `<line x1="0" y1="${center}" x2="${maxDeg}" y2="${center}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
            svg += `<text x="0" y="${maxDeg > 1000 ? 25 : 16}" fill="#f8fafc" font-size="${maxDeg > 1000 ? 20 : 12}" font-weight="bold" font-family="sans-serif" filter="url(#glow)">${formatText(title)}</text>`;

            let legX = maxDeg - 10;
            [...lines].reverse().forEach(line => {
                if(line.name) {
                    legX -= (maxDeg > 1000 ? 50 : 35);
                    svg += `<text x="${legX + (maxDeg > 1000 ? 15 : 12)}" y="${maxDeg > 1000 ? 25 : 16}" fill="${line.color}" font-size="${maxDeg > 1000 ? 16 : 11}" font-weight="bold" font-family="sans-serif">${formatText(line.name)}</text>`;
                    svg += `<line x1="${legX}" y1="${maxDeg > 1000 ? 20 : 13}" x2="${legX + 8}" y2="${maxDeg > 1000 ? 20 : 13}" stroke="${line.color}" stroke-width="3" filter="url(#glow)" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''}/>`;
                }
            });

            lines.forEach(line => {
                if (!data.length) return;
                let d = `M 0 ${center - (data[0][line.key] || 0) * scale}`;
                for (let i = 1; i <= maxDeg; i++) {
                    const val = data[i][line.key] || 0;
                    const prevVal = data[i - 1][line.key] || 0;
                    const y = center - val * scale;
                    const prevY = center - prevVal * scale;
                    
                    if (Math.abs(y - prevY) > scale * 0.15) {
                        d += ` L ${i} ${prevY}`;
                    }
                    d += ` L ${i} ${y}`;
                }
                
                if (line.fill) {
                    svg += `<path d="${d} L ${maxDeg} ${center} L 0 ${center} Z" fill="${line.fill}" opacity="0.6"/>`;
                }
                
                svg += `<path d="${d}" fill="none" stroke="${line.color}" stroke-width="${line.width || 2}" filter="url(#glow-intense)" ${line.dash ? `stroke-dasharray="${line.dash}"` : ''} />`;
            });
            svg += `</svg>`;
            return svg;
        };

        const getBlocks = (data, key, maxDeg) => {
            const blocks = [];
            let start = null;
            for (let i = 0; i <= maxDeg; i++) {
                if (data[i] && data[i][key] && start === null) start = i;
                if (data[i] && !data[i][key] && start !== null) {
                    blocks.push({ s: start, e: i });
                    start = null;
                }
            }
            if (start !== null) blocks.push({ s: start, e: maxDeg });
            return blocks;
        };

        const buildGanttChart = (data, devices, maxDeg) => {
            const rowHeight = maxDeg > 1000 ? 34 : 24;
            const height = devices.length * rowHeight + 35;
            let svg = `<svg viewBox="0 0 ${maxDeg} ${height}" class="w-full h-auto overflow-visible mb-8 block text-left bg-black/20 rounded-xl" style="min-height: ${height}px;">`;
            
            for(let deg = 0; deg <= maxDeg; deg += 90) {
                svg += `<line x1="${deg}" y1="0" x2="${deg}" y2="${height}" stroke="${colors.grid}" stroke-dasharray="2 2" stroke-width="${maxDeg > 1000 ? 1.5 : 1}"/>`;
            }
            
            svg += `<text x="5" y="${maxDeg > 1000 ? 25 : 16}" fill="#f8fafc" font-size="${maxDeg > 1000 ? 18 : 12}" font-weight="bold" font-family="sans-serif">Device Conduction Sequence</text>`;

            devices.forEach((dev, idx) => {
                const y = idx * rowHeight + 30;
                svg += `<text x="5" y="${y + (maxDeg > 1000 ? 16 : 13)}" fill="${dev.color}" font-size="${maxDeg > 1000 ? 14 : 10}" font-weight="bold" font-family="sans-serif" filter="url(#glow)">${formatText(dev.label)}</text>`;
                const blocks = getBlocks(data, dev.key, maxDeg);
                blocks.forEach(b => {
                    svg += `<rect x="${b.s}" y="${y}" width="${b.e - b.s}" height="${maxDeg > 1000 ? 22 : 16}" fill="${dev.color}" opacity="0.9" rx="3" filter="url(#glow)" />`;
                });
            });
            svg += `</svg>`;
            return svg;
        };

        const computeData = () => {
            const arr = [];
            const maxDeg = state.freqRatio * 360;
            const halfCycle = maxDeg / 2;
            const aP = state.alphaP;
            const aN = state.linked ? aP : state.alphaN;

            let activeP = null;
            let activeN = null;

            for (let i = -360; i <= maxDeg; i++) {
                let mod360 = (i % 360 + 360) % 360;
                let vA = Math.sin(toRad(i));
                let vB = Math.sin(toRad(i - 120));
                let vC = Math.sin(toRad(i - 240));

                if (state.mode === '3p1p-hw') {
                    if (mod360 === (30 + aP) % 360) activeP = 'A';
                    if (mod360 === (150 + aP) % 360) activeP = 'B';
                    if (mod360 === (270 + aP) % 360) activeP = 'C';

                    if (mod360 === (210 + aN) % 360) activeN = 'A';
                    if (mod360 === (330 + aN) % 360) activeN = 'B';
                    if (mod360 === (90 + aN) % 360) activeN = 'C';

                    if (activeP === 'A' && vA < 0) activeP = null;
                    if (activeP === 'B' && vB < 0) activeP = null;
                    if (activeP === 'C' && vC < 0) activeP = null;

                    if (activeN === 'A' && vA > 0) activeN = null;
                    if (activeN === 'B' && vB > 0) activeN = null;
                    if (activeN === 'C' && vC > 0) activeN = null;

                    if (i >= 0) {
                        let vo = 0;
                        let isP = (i < halfCycle);
                        
                        if (isP) {
                            if (activeP === 'A') vo = vA;
                            if (activeP === 'B') vo = vB;
                            if (activeP === 'C') vo = vC;
                        } else {
                            if (activeN === 'A') vo = vA;
                            if (activeN === 'B') vo = vB;
                            if (activeN === 'C') vo = vC;
                        }
                        arr.push({ deg: i, vA, vB, vC, vo, pActive: isP, nActive: !isP, pA: activeP==='A', pB: activeP==='B', pC: activeP==='C', nA: activeN==='A', nB: activeN==='B', nC: activeN==='C' });
                    }
                } 
                else if (state.mode === '1p1p') {
                    if (i >= 0) {
                        let vo = 0;
                        let mod180 = i % 180;
                        let isP = (i < halfCycle);
                        
                        if (isP) {
                            if (mod180 >= aP) vo = (i % 360 < 180) ? vA : -vA;
                        } else {
                            if (mod180 >= aN) vo = (i % 360 < 180) ? -vA : vA;
                        }
                        
                        let t13 = isP && (mod180 >= aP) && (i % 360 < 180);
                        let t24 = isP && (mod180 >= aP) && (i % 360 >= 180);
                        let t13_n = !isP && (mod180 >= aN) && (i % 360 < 180);
                        let t24_n = !isP && (mod180 >= aN) && (i % 360 >= 180);

                        arr.push({ deg: i, vA, vo, pActive: isP, nActive: !isP, t13, t24, t13_n, t24_n });
                    }
                }
            }
            return { data: arr, maxDeg };
        };

        const render = () => {
            el.modeContainer.innerHTML = MODES.map(m => `
                <button data-mode="${m.id}" class="w-full text-left px-5 py-3 rounded-xl transition-all duration-300 border ${state.mode === m.id ? 'active-btn font-bold scale-[1.02]' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10 hover:text-white'}">
                    ${m.label}
                </button>
            `).join('');

            document.querySelectorAll('#mode-container button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.mode = e.target.closest('button').dataset.mode;
                    render();
                });
            });

            el.circuitDiagram.innerHTML = getCircuitSVG(state.mode);

            if (state.linked) {
                state.alphaN = state.alphaP;
                el.sliderN.value = state.alphaP;
            }

            el.contN.style.opacity = state.linked ? '0.3' : '1';
            el.contN.style.pointerEvents = state.linked ? 'none' : 'auto';

            el.valP.innerText = state.alphaP + '°';
            el.valN.innerText = state.alphaN + '°';
            el.valFreq.innerText = state.freqRatio;

            const { data, maxDeg } = computeData();
            let svgsHTML = "";

            if (state.mode === '3p1p-hw') {
                svgsHTML += buildWaveChart("Source Voltages", data, [
                    { key: 'vA', color: colors.phaseA, width: 2, name: 'v_an' },
                    { key: 'vB', color: colors.phaseB, width: 2, name: 'v_bn' },
                    { key: 'vC', color: colors.phaseC, width: 2, name: 'v_cn' }
                ], maxDeg, 160, 80, 50);

                svgsHTML += buildGanttChart(data, [
                    { key: 'pActive', label: 'P-Conv Active', color: colors.pConv },
                    { key: 'nActive', label: 'N-Conv Active', color: colors.nConv },
                    { key: 'pA', label: 'T_1 (Phase A+)', color: colors.phaseA },
                    { key: 'pB', label: 'T_3 (Phase B+)', color: colors.phaseB },
                    { key: 'pC', label: 'T_5 (Phase C+)', color: colors.phaseC },
                    { key: 'nA', label: 'T_1\' (Phase A-)', color: '#ff80a6' },
                    { key: 'nB', label: 'T_3\' (Phase B-)', color: '#80f8ff' },
                    { key: 'nC', label: 'T_5\' (Phase C-)', color: '#80ffb2' }
                ], maxDeg);
            } else {
                svgsHTML += buildWaveChart("Source Voltage", data, [
                    { key: 'vA', color: colors.phaseA, width: 2.5, name: 'v_s' }
                ], maxDeg, 160, 80, 50);

                svgsHTML += buildGanttChart(data, [
                    { key: 'pActive', label: 'P-Converter Active', color: colors.pConv },
                    { key: 'nActive', label: 'N-Converter Active', color: colors.nConv },
                    { key: 't13', label: 'T_1 & T_3', color: colors.pConv },
                    { key: 't24', label: 'T_4 & T_2', color: '#ff80a6' },
                    { key: 't13_n', label: 'T_1\' & T_3\'', color: colors.nConv },
                    { key: 't24_n', label: 'T_4\' & T_2\'', color: '#80f8ff' }
                ], maxDeg);
            }

            svgsHTML += buildWaveChart(`Synthesized Output Voltage`, data, [
                { key: 'vo', color: colors.vo, fill: 'rgba(245, 158, 11, 0.2)', width: 2.5, name: 'v_o' }
            ], maxDeg, 200, 100, 70);

            el.wrapper.innerHTML = svgsHTML;
        };

        el.sliderP.addEventListener('input', e => { state.alphaP = parseInt(e.target.value); render(); });
        el.sliderN.addEventListener('input', e => { state.alphaN = parseInt(e.target.value); render(); });
        el.sliderFreq.addEventListener('input', e => { state.freqRatio = parseInt(e.target.value); render(); });
        
        el.zoomSlider.addEventListener('input', e => {
            state.zoom = parseInt(e.target.value);
            el.zoomLabel.innerText = state.zoom + '%';
            el.wrapper.style.width = `${state.zoom}%`;
            if (state.zoom < 100) el.wrapper.style.minWidth = '0px'; 
            else el.wrapper.style.minWidth = `${state.zoom * 8}px`; 
        });

        el.checkUnlink.addEventListener('change', e => {
            state.linked = !e.target.checked;
            render();
        });

        render();
    </script>
</body>
</html>
